<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infografis Speed Hosting 2026 - Lihlas Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .infografis-card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 500px;
            text-align: center;
        }

        h2 {
            color: var(--text);
            font-weight: 900;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .bar-container {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 700;
            font-size: 0.95rem;
        }

        .bar-bg {
            background: rgba(255, 255, 255, 0.05);
            height: 14px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--accent), var(--success));
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .grade {
            background: var(--success);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 900;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #475569;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="infografis-card">
        <h2>Performa Hosting Indonesia 2026</h2>
        <p>Hasil Test Benchmarking Independen (Server SG) - Versi GTMetrix 2.0</p>

        <!-- Hostinger -->
        <div class="bar-container">
            <div class="label-row">
                <span>Hostinger Cloud</span>
                <span>98% <span class="grade">A</span></span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill" style="width: 98%;"></div>
            </div>
        </div>

        <!-- IDCloudHost -->
        <div class="bar-container">
            <div class="label-row">
                <span>IDCloudHost NVMe</span>
                <span>95% <span class="grade">A</span></span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill" style="width: 95%;"></div>
            </div>
        </div>

        <!-- Niagahoster -->
        <div class="bar-container">
            <div class="label-row">
                <span>Niagahoster Pro</span>
                <span>92% <span class="grade">A</span></span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill" style="width: 92%;"></div>
            </div>
        </div>

        <div class="footer-note">
            *Data diriset Maret 2026 menggunakan koneksi NVMe SSD & Litespeed Server.<br>
            Disiapkan oleh: ddwfly.com
        </div>
    </div>

</body>

</html>
